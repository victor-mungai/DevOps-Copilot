version: "3.9"
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-copilot-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:latest
    container_name: devops-copilot-pushgateway
    ports:
      - "9091:9091"
